name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate version consistency
        run: |
          VERSION=$(node -e "
            const fs = require('fs');
            const src = fs.readFileSync('src/index.ts', 'utf8');
            const m = src.match(/COREE_VERSION = \"([\d.]+)\"/);
            if (!m) { console.error('Version not found in src/index.ts'); process.exit(1); }
            console.log(m[1]);
          ")
          echo "Source version: $VERSION"
          for file in opencode.md README.md; do
            if ! grep -q "@coree-ai/coree@$VERSION" "$file"; then
              echo "ERROR: version mismatch between src/index.ts and $file"
              exit 1
            fi
          done
          echo "Version is consistent: $VERSION"
